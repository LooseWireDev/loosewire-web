<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=DM+Mono:wght@400;500&family=Lora:ital@1&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 2560px; height: 1440px; overflow: hidden; }
  body {
    background: #f5f1e8;
    background-image: repeating-linear-gradient(
      to bottom,
      transparent, transparent 55px,

  .margin-line {
    position: absolute; top: 0; left: 560px; width: 3px; height: 1440px;
    background: rgba(160,50,50,0.14);
  }
  /* YouTube safe area: 1546x423 centered */
  .safe {
    position: absolute;
    left: 507px; top: 508px; width: 1546px; height: 423px;
    display: flex; align-items: center; justify-content: center; gap: 72px;
  }
  .text h1 {
    font-size: 150px; font-weight: 700; letter-spacing: -0.03em; line-height: 0.95;
    margin-bottom: 20px;
  }
  .text .label {
    font-family: 'DM Mono', monospace; font-size: 26px; letter-spacing: 0.2em;
    text-transform: uppercase; color: #8c8478;
  }
</style>
</head>
<body>
  <div class="margin-line"></div>
  <div class="safe">
    <svg width="330" height="183" viewBox="0 0 180 100" fill="none">
      <path d="M6 10 C18 10 18 90 33 90 C50 90 50 10 66 10 C82 10 82 90 99 90 C116 90 116 10 128 10" stroke="#1c1a14" stroke-width="3.5" stroke-linecap="round" opacity="0.30"/>

      <path d="M32 10 C48 10 48 90 69 90 C88 90 88 10 102 10 C116 10 116 90 135 90 C152 90 152 10 172 10" stroke="#1c1a14" stroke-width="4" stroke-linecap="round" opacity="1"/>
    </svg>
    <div class="text">
      <h1>loosewire</h1>
      <p class="label">Independent dev &middot; loosewire.dev</p>
    </div>
  </div>
</body>
</html>
